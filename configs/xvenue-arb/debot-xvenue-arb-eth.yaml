# xvenue-arb live config — ETH primary (bot-strategy#166).
#
# Values track the Phase 1 BT-validated recommended config from
# #166 part 9 (2026-04-27): post-only 50% slippage assumption,
# tight funding lockout, 100 bps reference guard for ETH.
#
# Field semantics: docs/DESIGN.md §6 + docs/execution_layer.md.
# Schema/defaults: src/xvenue/config.rs (XvenueConfig).
#
# Override at runtime via $XVENUE_CONFIG_PATH; secrets stay in
# /opt/debot/scripts/debot-xvenue-arb.env (see env.example).

agent_name: debot-xvenue-arb-eth
dry_run: false                # 2026-05-16 re-LIVE per bot-strategy#330 DRY_RUN soak verdict (T+10d, 360 RTs, paper_net_bps_avg +5.81 cum / +11.00 marg on wider regime, wb_fill_rate 95.83% / wb_exit_fill_rate 97.22%, zero halts/emergencies). Exit-side LighterMakerLoop landed (87a5a1e + telemetry 0c2fda7 + projected PnL 57bdb2e). 24h LIVE window re-evaluates #328 acceptance (real maker share by qty ≥ 30%). Notional and chase budget unchanged. Operator-paused 2026-05-06 → re-LIVE-flipped 2026-05-16.

# ---- Symbol pair (one symbol per process) ----
symbol_ext: ETH-USD
symbol_lt:  ETH

# ---- Spread engine ----
spread_bucket_ms: 5000        # Phase 1 BT bucket; matches dump cadence
rolling_window_sec: 1200      # 20 min — ETH best from #166 part 5 grid
max_abs_spread_bps: 100.0     # outlier filter (feed-stall guard)
min_warmup_samples: 90        # ~7.5 min at 5s buckets

# ---- Signal engine ----
abs_threshold_bps: 5.0        # Phase 1 ETH champion
persistence_sec: 15
exit_at_mean_cross: true
max_hold_sec: 600
force_close_dev_bps: 30.0
entry_check_threshold_at_fire: true   # strict (matches Python sim, #166 part 3)

# Funding cycle filter (tight per #166 part 7: keeps 82% of PnL)
funding_cycle_sec: 3600
funding_lockout_pre_sec: 660
funding_lockout_post_sec: 120

# ---- Sizing ----
trade_size_pct: 0.05          # 5% of (ext + lt) equity
min_notional_usd: 20
# Phase 3 small-notional probe cap (#166 / #244 Sprint 4 follow-up).
# Lowered from 1000 → 100 → 50 over successive incidents (2026-05-02
# leg-mismatch / 5/3 #287 fixes re-probe). Ramp 50 → 100 → 250 → 1000
# only after each tier survives ≥3 clean round-trips under real flow.
max_notional_usd: 50

# ---- Execution: Extended (taker — see #302) ----
# bot-strategy#302: 25 h LIVE on 2026-05-02..03 produced 1/100 post_only fills
# (97 timed out at the touch with cancelled=false → queue position never matured
# at $50 notional, not a price-through). Phase 1 BT already models Extended as
# taker (extended_taker_fee_bps=2.5), so flipping to taker-direct loses no PnL
# vs the BT projection while removing 6 s of dead chase per leg, which also
# shrinks the WS-lag exposure window that triggers #298 EXIT-side ext Timeout.
# Re-evaluate (i.e. revisit Direction 3 / chase_ticks-for-real) once we have a
# data-backed reason to expect maker fills at higher notional or BTC.
extended_post_only: false
extended_chase_ticks: 1
extended_chase_retries: 3
extended_chase_timeout_ms: 2000   # poll_until_terminal_or_deadline reuses this for the taker poll budget; left at 2000 ms which the 2026-05-02 #244 live probe established as enough for Extended fill ack.
extended_taker_fallback: true
extended_min_qty: 0.01            # bot-strategy#299: Extended ETH min order size. Skip taker fallback when post_only fills target_qty within this floor — connector would otherwise reject with "Order size 0 below min 0.01" and emit a noisy WARN.
extended_taker_grace_poll_ms: 1000   # bot-strategy#298: WS-lag grace re-poll after taker `filled=0 cancelled=false`. Largely obviated by #302 (true IOC terminates immediately), kept defensively until verified to be unnecessary.
extended_taker_slippage_bps: 50   # bot-strategy#302: slippage budget for the IOC taker path (`create_order_taker_ioc`). The connector places at touch ± 1 tick ± slippage so the order crosses on the first opposing level even when the book moves a few ticks between read and submit. Mirrors `close_all_positions`'s default. Tune downward (e.g. 20 bps) once we have a few weeks of fill-cost data on the IOC path.

# ---- Execution: Lighter (post_only chase via LighterMakerLoop, #309/#317) ----
# bot-strategy#317: dex-connector v4.5.3 verified Lighter post_only via
# spread=-2 → TIF_POST_ONLY mapping (lighter_connector::mod.rs:2849-2850
# + 5 unit tests + lighter-spike binary).
# Entry-side flips to LighterMakerLoop here. Exit-side stays on
# LighterFillLoop (taker) — see live.rs handle_decision_enter branching;
# ParallelExitLoop refactor to support maker is a separate change.
lighter_post_only: true
# bot-strategy#322 timing widened. Original 4×200ms was shorter than
# Lighter's WS fill-propagation latency (observed 0-500ms, sometimes
# higher) — the chase round timed out reporting filled=0 then placed
# a fresh order on top, stacking exposure that emergency flatten then
# unwound at slippage cost. 2×800ms still fits leg_mismatch budget
# (1600 + ext 2000 = 3600 vs 10000 limit).
lighter_chase_retries: 4              # bot-strategy#328: 4 × 1500ms = 6000ms chase budget (was 2×800=1600ms). #309 Phase 0 verdict found 0.35% maker share — original budget was ~16% of available leg_mismatch headroom. Normal-case post-Ext ~7.5s, worst-case ~9.5s with grace, fits 10s leg_mismatch with ~0.5s buffer.
lighter_chase_timeout_ms: 1500
lighter_chase_grace_poll_ms: 500      # #322: post-cancel grace re-poll for chase rounds (catches WS-lag late fills before next round places fresh order)
lighter_taker_grace_poll_ms: 1000     # #322: same grace re-poll for the taker fallback round (mirrors extended_taker_grace_poll_ms / #298)
lighter_taker_fallback: true          # if chase rounds fail, taker the residual so cross-venue exposure doesn't dangle
lighter_exit_improve_tick: 0.01       # bot-strategy#424 (Option B from #328): exit-side post_only improves the touch by 1 tick (= 0.01 USD ≈ 0.5 bps for ETH) instead of joining, so MeanCross exits become the new touch and aggressors hit. Entry side still joins (works at 41% maker share). 0 disables for back-compat.
lighter_min_qty: 0.001                # bot-strategy#331 (Lighter mirror of #299): Lighter ETH post_only minimum. Live evidence (2026-05-05) showed Lighter rejects post_only with code:21706 on `base_amount=1` (=0.0001 ETH ≈ $0.24) when a previous chase round's partial fill leaves a sub-lot residual. 0.001 ETH (~$2.40) sits above the rejection floor and well below the 5% equity trade size (~0.021 ETH at $50 notional), so a sub-min residual after a partial fill is treated as fully filled instead of producing a noisy WARN that auto-files an error-watch issue.
# Legacy LighterFillLoop knobs — still active on the EXIT side via
# ParallelExitLoop. Keep set so a future revert to lighter_post_only:false
# (or an exit cycle) still has sane defaults.
lighter_order_type: market
lighter_fill_timeout_ms: 1000

# ---- Risk ----
ws_stale_emergency_ms: 5000
max_inventory_skew_usd: 50.0
leg_mismatch_timeout_ms: 10000   # bot-strategy#288: must exceed Extended chase + taker budget. extended_chase_retries=3 × extended_chase_timeout_ms=2000 + 1 taker round × 2000 = 8 s; 10 s leaves 2 s buffer. Below this, the 2026-05-03 round-trip pattern (Lighter fills in ~1 s, Extended still chasing) triggers leg-mismatch every exit and forces the IOC 50bps emergency close.
kill_switch_file: /opt/debot/KILL_SWITCH   # external operator pause — pairtrade-symmetric (#244 D-1)
stuck_file: /var/run/xvenue-arb/STUCK      # runner self-write on unrecoverable emergency (#244 D-2..6 follow-up)
emergency_retry_interval_ms: 30000     # slow-mm 167-min stuck fix (docs/execution_layer.md §5)
rest_consec_fail_to_escalate: 3
reduce_only_consec_fail_to_kill: 5

# ---- Risk gates (#244 D-2..D-7) ----
max_daily_loss_bps: 300                # -3% of session_start_equity, auto-resets at UTC midnight
daily_reset_utc_hour: 0
max_session_loss_bps: 500              # -5% from rolling-peak; sticky until RISK_ACK
session_dd_lookback_secs: 86400        # 24h rolling peak
session_dd_sample_secs: 60
cb_tier1_threshold: 5                  # consec losses; cooldown active for tier1 / tier2
cb_tier1_cooldown_secs: 1800           # 30 min
cb_tier2_threshold: 8
cb_tier2_cooldown_secs: 21600          # 6h
risk_state_path: /var/lib/xvenue-arb/risk_state.json
risk_ack_path: /opt/debot/RISK_ACK     # pairtrade-symmetric (#244 D-5)

# ---- Reference guard (Binance 1m cross-check) ----
binance_reference_symbol: ETHUSDT
reference_max_dev_bps: 100.0           # ETH-specific (BTC would be 30; see #166 part 9)
reference_consec_buckets_for_halt: 3
