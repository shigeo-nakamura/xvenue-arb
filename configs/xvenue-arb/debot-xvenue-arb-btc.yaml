# xvenue-arb live config — BTC secondary (bot-strategy#166).
#
# Same Phase 1 champion shape as ETH, with BTC-specific reference
# threshold (30 bps — BTC's 1-minute realised range is much tighter).

agent_name: debot-xvenue-arb-btc
dry_run: true

# ---- Symbol pair ----
symbol_ext: BTC-USD
symbol_lt:  BTC

# ---- Spread engine ----
spread_bucket_ms: 5000
rolling_window_sec: 1200
max_abs_spread_bps: 100.0
min_warmup_samples: 90

# ---- Signal engine ----
abs_threshold_bps: 5.0
persistence_sec: 15
exit_at_mean_cross: true
max_hold_sec: 600
force_close_dev_bps: 30.0
entry_check_threshold_at_fire: true

funding_cycle_sec: 3600
funding_lockout_pre_sec: 660
funding_lockout_post_sec: 120

# ---- Sizing ----
trade_size_pct: 0.05
min_notional_usd: 20
max_notional_usd: 1000

# ---- Execution: Extended (taker — see #302) ----
# Symmetric with eth.yaml; see eth.yaml for the live evidence + Phase 1 BT context.
extended_post_only: false
extended_chase_ticks: 1
extended_chase_retries: 3
extended_chase_timeout_ms: 2000   # symmetric with ETH YAML; see eth.yaml for context
extended_taker_fallback: true
extended_min_qty: 0.0001          # bot-strategy#299: Extended BTC min order size (verify against connector MarketModel before flipping live).
extended_taker_grace_poll_ms: 1000   # bot-strategy#298: see eth.yaml for context.
extended_taker_slippage_bps: 50   # bot-strategy#302: see eth.yaml for context.

# ---- Execution: Lighter ----
lighter_order_type: market
lighter_fill_timeout_ms: 1000
lighter_min_qty: 0.00005           # bot-strategy#331: BTC counterpart of ETH's 0.001. Inactive while `lighter_post_only` stays default-false on the BTC config; pre-set so a future flip doesn't have to re-derive the floor. Verify against the connector MarketModel before relying on it live.

# ---- Risk ----
ws_stale_emergency_ms: 5000
max_inventory_skew_usd: 50.0
leg_mismatch_timeout_ms: 10000   # symmetric with eth.yaml; see #288 for context
kill_switch_file: /opt/debot/KILL_SWITCH   # external operator pause — pairtrade-symmetric (#244 D-1)
stuck_file: /var/run/xvenue-arb/STUCK      # runner self-write on unrecoverable emergency (#244 D-2..6 follow-up)
emergency_retry_interval_ms: 30000
rest_consec_fail_to_escalate: 3
reduce_only_consec_fail_to_kill: 5

# ---- Risk gates (#244 D-2..D-7) ----
max_daily_loss_bps: 300
daily_reset_utc_hour: 0
max_session_loss_bps: 500
session_dd_lookback_secs: 86400
session_dd_sample_secs: 60
cb_tier1_threshold: 5
cb_tier1_cooldown_secs: 1800
cb_tier2_threshold: 8
cb_tier2_cooldown_secs: 21600
risk_state_path: /var/lib/xvenue-arb/risk_state.json
risk_ack_path: /opt/debot/RISK_ACK

# ---- Reference guard (BTC: tight 30 bps; ETH would be 100; see #166 part 9) ----
binance_reference_symbol: BTCUSDT
reference_max_dev_bps: 30.0
reference_consec_buckets_for_halt: 3
